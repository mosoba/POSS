<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>{% block title %}Admin Panel · Price Point Kenya{% endblock %}</title>
    
    <!-- ===== STYLES ===== -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    
    <style>
        /* ===== BASE STYLES ===== */
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f4f8; color: #0f172a; min-height: 100vh; }
        
        /* ===== GLASS EFFECTS ===== */
        .glass {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        /* ===== ANIMATIONS ===== */
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(30px) scale(0.96); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .animate-slide { animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-fade { animation: fadeIn 0.5s ease forwards; }
        
        /* ===== HEADER ===== */
        .app-header {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(226,232,240,0.5);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: all 0.3s ease;
        }
        .app-header.scrolled { box-shadow: 0 4px 30px rgba(0,0,0,0.04); }
        
        .brand-text {
            font-weight: 900;
            font-size: 1.5rem;
            color: #0f172a;
            letter-spacing: -0.5px;
        }
        .brand-text span { 
            background: linear-gradient(135deg, #2563eb, #7c3aed, #2563eb);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s ease-in-out infinite;
        }
        
        /* ===== SIDEBAR ===== */
        .sidebar {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(226,232,240,0.4);
            border-radius: 20px;
            padding: 16px;
            height: fit-content;
            position: sticky;
            top: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.02);
            transition: all 0.3s ease;
        }
        .sidebar:hover { box-shadow: 0 8px 40px rgba(0,0,0,0.04); }
        
        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            color: #64748b;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            position: relative;
            overflow: hidden;
        }
        .sidebar-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            opacity: 0;
            transition: all 0.3s ease;
            border-radius: 12px;
        }
        .sidebar-item:hover::before,
        .sidebar-item.active::before {
            opacity: 0.08;
        }
        .sidebar-item:hover, .sidebar-item.active {
            color: #0f172a;
            transform: translateX(4px);
        }
        .sidebar-item i { 
            width: 20px; 
            color: #94a3b8;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }
        .sidebar-item:hover i, .sidebar-item.active i { 
            color: #2563eb;
            transform: scale(1.1);
        }
        .sidebar-item span { position: relative; z-index: 1; }
        .sidebar-item .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ef4444;
            margin-left: auto;
            position: relative;
            z-index: 1;
            animation: pulse 2s infinite;
        }
        
        /* ===== STAT CARDS ===== */
        .stat-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226,232,240,0.3);
            border-radius: 20px;
            padding: 22px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: default;
            position: relative;
            overflow: hidden;
        }
        .stat-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #2563eb, #7c3aed, #2563eb);
            background-size: 200% 100%;
            animation: shimmer 3s ease-in-out infinite;
            opacity: 0.6;
        }
        .stat-card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 20px 60px rgba(37,99,235,0.08);
            border-color: rgba(37,99,235,0.2);
        }
        .stat-card .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            transition: all 0.3s ease;
        }
        .stat-card:hover .stat-icon { transform: scale(1.1) rotate(-5deg); }
        .stat-card .stat-value { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; }
        .stat-card .stat-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
        }
        .stat-card .stat-change {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 9999px;
            background: #dcfce7;
            color: #16a34a;
        }
        .stat-card .stat-change.negative { background: #fee2e2; color: #dc2626; }
        
        /* ===== GLASS CARD ===== */
        .glass-card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(226,232,240,0.3);
            border-radius: 20px;
            padding: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }
        .glass-card:hover { box-shadow: 0 12px 48px rgba(0,0,0,0.04); border-color: rgba(37,99,235,0.1); }
        
        /* ===== BUTTONS ===== */
        .btn-primary {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            padding: 10px 24px;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .btn-primary:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 12px 30px rgba(0,0,0,0.1); }
        .btn-primary:active { transform: scale(0.98); }
        
        .btn-gradient {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: white;
            padding: 10px 24px;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(37,99,235,0.2);
        }
        .btn-gradient:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 12px 40px rgba(37,99,235,0.3); }
        
        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.8rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-danger:hover { transform: translateY(-2px) scale(1.05); box-shadow: 0 8px 25px rgba(239,68,68,0.3); }
        
        .btn-outline {
            border: 1px solid #e2e8f0;
            background: transparent;
            color: #475569;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 0.8rem;
        }
        .btn-outline:hover { border-color: #2563eb; color: #2563eb; background: rgba(37,99,235,0.04); transform: translateY(-2px); }
        
        /* ===== FORM ===== */
        .form-input {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 14px;
            width: 100%;
            color: #0f172a;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            backdrop-filter: blur(4px);
        }
        .form-input::placeholder { color: #94a3b8; }
        .form-input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37,99,235,0.06), 0 4px 20px rgba(37,99,235,0.04);
            background: white;
        }
        .form-label {
            color: #475569;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: block;
            margin-bottom: 4px;
        }
        .form-label i { color: #2563eb; margin-right: 4px; }
        
        /* ===== UPLOAD AREA ===== */
        .upload-area {
            border: 2px dashed #e2e8f0;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(248,250,252,0.6);
            backdrop-filter: blur(4px);
        }
        .upload-area:hover { border-color: #2563eb; background: rgba(37,99,235,0.04); transform: scale(1.01); }
        .upload-area.dragover { border-color: #2563eb; background: rgba(37,99,235,0.08); transform: scale(1.02); }
